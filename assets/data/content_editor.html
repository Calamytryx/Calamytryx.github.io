<!-- content editor and icon search -->
<!-- DEV-ONLY tool. Edits assets/data/*.json live via the File System Access API.
     Harmless if hosted publicly: it can only touch a folder the viewer picks on
     their own machine, never this repo. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>content editor — calamytryx (dev)</title>
<link rel="icon" href="/assets/media/logo.png">
<style>
  :root{
    --bg:#0a0a0c; --panel:#13171c; --panel2:#181d23; --line:#242b33;
    --txt:#c5ced6; --dim:#6b7681; --blood:#d11c1c; --green:#39d353;
    --mono:'Departure Mono','Cascadia Mono','JetBrains Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;line-height:1.5}
  header{display:flex;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:14px;letter-spacing:.5px}
  header h1 .dot{color:var(--blood)}
  header .sp{flex:1}
  button{font-family:var(--mono);font-size:12px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:4px;padding:6px 10px;cursor:pointer}
  button:hover{border-color:var(--blood);color:var(--blood)}
  button.primary{background:var(--blood);color:#000;border-color:var(--blood);font-weight:700}
  button.primary:hover{background:#f04}
  .status{font-size:11px;color:var(--dim)}
  .status.ok{color:var(--green)} .status.err{color:var(--blood)}
  .wrap{display:grid;grid-template-columns:1.3fr 1fr;height:calc(100vh - 50px)}
  .editor{overflow-y:auto;border-right:1px solid var(--line);padding:14px 16px 80px}
  .preview{overflow-y:auto;padding:16px;background:#060608}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .tab{flex:1;min-width:70px;background:var(--panel);color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:7px;cursor:pointer;letter-spacing:.5px}
  .tab.on{background:var(--panel2);color:var(--blood);border-color:var(--blood)}
  fieldset{border:1px solid var(--line);border-radius:5px;padding:10px 12px;margin:8px 0;background:var(--panel)}
  legend{color:var(--blood);font-size:11px;letter-spacing:1px;padding:0 6px}
  .field{margin:7px 0}
  .field>label{display:block;color:var(--dim);font-size:11px;margin-bottom:3px}
  input[type=text],input[type=number],textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:13px;padding:6px 8px;border-radius:4px}
  textarea{min-height:54px;resize:vertical;line-height:1.4}
  input:focus,textarea:focus{outline:1px solid var(--blood);outline-offset:-1px}
  .check{display:inline-flex;align-items:center;gap:6px;color:var(--txt);cursor:pointer;margin-right:14px}
  .row-item{border:1px dashed var(--line);border-radius:5px;padding:8px 10px;margin:8px 0;position:relative;background:var(--panel2)}
  .row-tools{display:flex;gap:4px;justify-content:flex-end;margin-bottom:6px}
  .row-tools button{padding:2px 8px;font-size:11px}
  .addbtn{margin-top:6px}
  .iconpick{display:flex;align-items:center;gap:8px}
  .iconpick .sw{width:34px;height:34px;border:1px solid var(--line);background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--blood)}
  .iconpick .sw svg{width:22px;height:22px;fill:currentColor}
  /* icon search modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50}
  .modal.open{display:flex}
  .modal_box{background:var(--panel);border:1px solid var(--blood);border-radius:6px;width:min(680px,92vw);max-height:80vh;display:flex;flex-direction:column;padding:14px}
  .icongrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px;overflow-y:auto;margin-top:10px}
  .icongrid button{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;color:var(--txt)}
  .icongrid button svg{width:22px;height:22px;fill:currentColor}
  .icongrid button .nm{font-size:8px;color:var(--dim);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* preview */
  .pv_h{color:var(--dim);font-size:11px;letter-spacing:1px;margin:14px 0 6px;text-transform:uppercase}
  .pv_cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .pv_card{border:2px solid var(--line);background:var(--panel);padding:12px;display:flex;flex-direction:column;gap:8px}
  .pv_card.featured{border-color:var(--blood);box-shadow:5px 5px 0 #3a0d0d}
  .pv_card .ic{width:46px;height:46px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--txt)}
  .pv_card .ic svg{width:28px;height:28px;fill:currentColor}
  .pv_card h4{font-size:14px}
  .pv_card .u{font-size:10px;color:var(--dim);word-break:break-all}
  .pv_badge{background:var(--blood);color:#000;font-size:9px;padding:1px 5px;margin-left:5px}
  .pv_sec{border-left:2px solid var(--blood);padding-left:10px;margin:8px 0}
  .pv_sec b{color:#fff} .pv_sec p{color:var(--dim);font-size:12px}
</style>
  <script src="/assets/layout/cursors.js" defer></script>
</head>
<body>
<header>
  <h1>content<span class="dot">.</span>editor</h1>
  <button id="openBtn" class="primary">open repo folder</button>
  <button id="saveBtn" disabled>save all</button>
  <button id="dlBtn">download current</button>
  <button id="dlAllBtn">download all (4)</button>
  <span class="sp"></span>
  <span class="status" id="status">pick your repo folder to edit live, or it loads read-only over http</span>
</header>

<div class="wrap">
  <div class="editor">
    <div class="tabs" id="tabs"></div>
    <div id="form"></div>
  </div>
  <div class="preview" id="preview"></div>
</div>

<!-- icon search modal -->
<div class="modal" id="iconModal">
  <div class="modal_box">
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="iconSearch" placeholder="search icons… (e.g. tiktok, heart, arrow)" style="flex:1;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);padding:7px;border-radius:4px">
      <button id="iconClose">close</button>
    </div>
    <div class="status" id="iconCount" style="margin-top:6px"></div>
    <div class="icongrid" id="iconGrid"></div>
  </div>
</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const FILES = ['site','socials','menu','sections'];
let dataHandle = null;          // FileSystemDirectoryHandle for assets/data
let DATA = {};                  // loaded json by name
let ICONS = {};                 // baseName -> svg
let ICON_LIST = [];             // [{name, kw, svg}]
let current = 'site';
const hasFS = 'showDirectoryPicker' in window;

function setStatus(msg, cls){ const e=$('#status'); e.textContent=msg; e.className='status'+(cls?' '+cls:''); }

/* ---------- load ---------- */
async function readJSON(name){
  if (dataHandle){
    const fh = await dataHandle.getFileHandle(name+'.json');
    const f = await fh.getFile();
    return JSON.parse(await f.text());
  }
  const r = await fetch('/assets/data/'+name+'.json', {cache:'no-cache'});
  if(!r.ok) throw new Error(name+'.json '+r.status);
  return r.json();
}
async function loadIcons(){
  const r = await fetch('/assets/icons/icons_grid.json', {cache:'no-cache'});
  const arr = await r.json();
  ICONS = {}; ICON_LIST = [];
  const seen = {};
  arr.forEach(e=>{
    const n = e.baseName || e.nameWithoutExtension;
    if(!n) return;
    if(!(n in ICONS) || e.style==='sharp') ICONS[n]=e.source;
  });
  Object.keys(ICONS).forEach(n=>{ ICON_LIST.push({name:n, svg:ICONS[n]}); });
}
async function loadAll(){
  try{
    for(const n of FILES) DATA[n] = await readJSON(n);
    if(!ICON_LIST.length) await loadIcons();
    normalize();
    renderTabs(); renderForm(); renderPreview();
    setStatus(dataHandle ? 'editing live from disk — save writes back to your files' : 'loaded read-only (use Open folder to save live)', 'ok');
  }catch(err){ setStatus('load failed: '+err.message, 'err'); console.error(err); }
}

/* ---------- save ---------- */
async function saveAll(){
  if(!dataHandle){ setStatus('no folder opened — use download instead', 'err'); return; }
  try{
    for(const n of FILES){
      const fh = await dataHandle.getFileHandle(n+'.json', {create:true});
      const w = await fh.createWritable();
      await w.write(JSON.stringify(DATA[n], null, 2)+'\n');
      await w.close();
    }
    setStatus('saved all 4 files ✓ — reload the site to see it', 'ok');
  }catch(err){ setStatus('save failed: '+err.message, 'err'); }
}
function downloadJSON(name, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)+'\n'], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}
function downloadCurrent(){ downloadJSON(current, DATA[current]); }
function downloadAll(){
  normalize();
  FILES.forEach((n,i)=> setTimeout(()=>downloadJSON(n, DATA[n]), i*250));   /* stagger so Firefox allows all 4 */
  setStatus('downloaded all 4 — drop them into assets/data/ (allow multiple downloads if Firefox asks)', 'ok');
}

/* ---------- tabs ---------- */
function renderTabs(){
  $('#tabs').innerHTML = FILES.map(n=>
    `<button class="tab${n===current?' on':''}" data-tab="${n}">${n}.json</button>`).join('');
  $('#tabs').querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ current=b.dataset.tab; renderTabs(); renderForm(); });
}

/* ---------- schema-driven form ----------
   Every list item of a known type renders its FULL field set (with defaults),
   so e.g. every social exposes featured/badge/card/row — not only the entries
   that happen to already have those keys in the json. Add buttons seed new
   items from the schema too. */
const SCHEMAS = {
  social: [
    {k:'name',t:'text'}, {k:'url',t:'text'}, {k:'handle',t:'text'}, {k:'icon',t:'icon'},
    {k:'featured',t:'bool',def:false}, {k:'badge',t:'text',def:''},
    {k:'card',t:'bool',def:true}, {k:'row',t:'bool',def:true}
  ],
  navItem:   [ {k:'label',t:'text'}, {k:'href',t:'text'}, {k:'page',t:'text',opt:true}, {k:'icon',t:'icon',opt:true} ],
  footerCol: [ {k:'title',t:'text'}, {k:'links',t:'array',of:'menuLink',def:[]} ],
  menuLink:  [ {k:'label',t:'text'}, {k:'href',t:'text'}, {k:'icon',t:'icon',opt:true} ],
  cdcItem:   [ {k:'title',t:'text'}, {k:'body',t:'textarea'} ]
};
const ARRAY_TYPE = { 'socials':'social', 'menu.nav':'navItem', 'menu.footer':'footerCol', 'sections.cdc':'cdcItem' };

function isObj(v){ return v && typeof v==='object' && !Array.isArray(v); }
function longish(v){ return typeof v==='string' && v.length>48; }
function dflt(f){ return 'def' in f ? f.def : (f.t==='bool'?false:f.t==='array'?[]:''); }
function clone(v){ return Array.isArray(v)?v.slice():isObj(v)?Object.assign({},v):v; }

/* fill non-optional schema keys so socials.json etc. are written explicitly on save */
function normalize(){
  (DATA.socials||[]).forEach(s=>ensureKeys(s,'social'));
  const m = DATA.menu||{};
  (m.nav||[]).forEach(n=>ensureKeys(n,'navItem'));
  (m.footer||[]).forEach(c=>{ ensureKeys(c,'footerCol'); (c.links||[]).forEach(l=>ensureKeys(l,'menuLink')); });
  ((DATA.sections&&DATA.sections.cdc)||[]).forEach(c=>ensureKeys(c,'cdcItem'));
}
function ensureKeys(obj,type){ (SCHEMAS[type]||[]).forEach(f=>{ if(f.opt) return; if(!(f.k in obj)) obj[f.k]=clone(dflt(f)); }); }

function renderForm(){
  const host=$('#form'); host.innerHTML='';
  host.appendChild(buildNode(current, DATA[current], DATA, current, null));
}
function fieldset(title){ const fs=document.createElement('fieldset'); const lg=document.createElement('legend'); lg.textContent=title; fs.appendChild(lg); return fs; }

function buildNode(key, value, parent, path, type){
  if(Array.isArray(value)) return buildArray(key, value, path, type || ARRAY_TYPE[path]);
  if(isObj(value) && type && SCHEMAS[type]) return buildSchemaObject(value, type);
  if(isObj(value)) return buildObject(key, value, path);
  return buildScalar(key, value, parent, path);
}
function buildObject(key, obj, path){
  const fs=fieldset(key);
  Object.keys(obj).forEach(k=> fs.appendChild(buildNode(k, obj[k], obj, path+'.'+k, null)));
  return fs;
}
function buildSchemaObject(obj, type){
  const tag = obj.name || obj.label || obj.title || '';
  const fs=fieldset(type + (tag?' · '+tag:''));
  SCHEMAS[type].forEach(f=>{
    if(f.t==='array'){
      if(!Array.isArray(obj[f.k])) obj[f.k]=[];
      fs.appendChild(buildArray(f.k, obj[f.k], type+'.'+f.k, f.of));
    } else {
      fs.appendChild(buildSchemaField(f, obj));
    }
  });
  return fs;
}
function buildSchemaField(f, obj){
  const wrap=document.createElement('div'); wrap.className='field';
  if(f.t==='bool'){
    const cur = (f.k in obj) ? !!obj[f.k] : !!dflt(f);
    obj[f.k]=cur;
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=cur;
    cb.onchange=()=>{ obj[f.k]=cb.checked; renderPreview(); };
    const l=document.createElement('label'); l.className='check'; l.appendChild(cb); l.append(' '+f.k);
    wrap.appendChild(l); return wrap;
  }
  const lab=document.createElement('label'); lab.textContent=f.k+(f.opt?' (optional)':''); wrap.appendChild(lab);
  if(f.t==='icon'){
    const pick=document.createElement('div'); pick.className='iconpick';
    const cur=obj[f.k]||'';
    const sw=document.createElement('span'); sw.className='sw'; sw.innerHTML=ICONS[cur]||'·';
    const inp=document.createElement('input'); inp.type='text'; inp.value=cur; inp.placeholder=f.opt?'(none)':'icon name';
    const setVal=v=>{ v=(v||'').trim(); if(f.opt && !v) delete obj[f.k]; else obj[f.k]=v; sw.innerHTML=ICONS[v]||'·'; renderPreview(); };
    inp.oninput=()=>setVal(inp.value);
    const btn=document.createElement('button'); btn.type='button'; btn.textContent='search';
    btn.onclick=()=>openIconSearch(v=>{ inp.value=v; setVal(v); });
    pick.append(sw,inp,btn); wrap.appendChild(pick); return wrap;
  }
  let inp;
  if(f.t==='textarea' || longish(obj[f.k])){ inp=document.createElement('textarea'); }
  else { inp=document.createElement('input'); inp.type='text'; }
  inp.value = obj[f.k]==null?'':obj[f.k];
  inp.oninput=()=>{ if(f.opt && !inp.value) delete obj[f.k]; else obj[f.k]=inp.value; renderPreview(); };
  wrap.appendChild(inp); return wrap;
}
function buildScalar(key, value, parent, path){
  const wrap=document.createElement('div'); wrap.className='field';
  if(typeof value==='boolean'){
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=value;
    cb.onchange=()=>{ parent[key]=cb.checked; renderPreview(); };
    const l=document.createElement('label'); l.className='check'; l.appendChild(cb); l.append(' '+key);
    wrap.appendChild(l); return wrap;
  }
  const lab=document.createElement('label'); lab.textContent=key; wrap.appendChild(lab);
  let inp;
  if(typeof value==='number'){ inp=document.createElement('input'); inp.type='number'; inp.value=value;
    inp.oninput=()=>{ parent[key]=inp.value===''?0:Number(inp.value); renderPreview(); }; }
  else if(longish(value)){ inp=document.createElement('textarea'); inp.value=value;
    inp.oninput=()=>{ parent[key]=inp.value; renderPreview(); }; }
  else { inp=document.createElement('input'); inp.type='text'; inp.value=value==null?'':value;
    inp.oninput=()=>{ parent[key]=inp.value; renderPreview(); }; }
  wrap.appendChild(inp); return wrap;
}
function buildArray(key, arr, path, itemType){
  const fs=fieldset(key+' ['+arr.length+']'+(itemType?' · '+itemType:''));
  arr.forEach((item, i)=>{
    const row=document.createElement('div'); row.className='row-item';
    const tools=document.createElement('div'); tools.className='row-tools';
    const up=mkBtn('↑',()=>{ if(i>0){ arr.splice(i-1,0,arr.splice(i,1)[0]); rerender(); } });
    const dn=mkBtn('↓',()=>{ if(i<arr.length-1){ arr.splice(i+1,0,arr.splice(i,1)[0]); rerender(); } });
    const rm=mkBtn('✕',()=>{ arr.splice(i,1); rerender(); }); rm.style.color='var(--blood)';
    tools.append(up,dn,rm); row.appendChild(tools);
    if(itemType && SCHEMAS[itemType] && isObj(item)) row.appendChild(buildSchemaObject(item, itemType));
    else row.appendChild(buildNode(i, item, arr, path+'['+i+']', null));
    fs.appendChild(row);
  });
  const add=document.createElement('button'); add.className='addbtn'; add.textContent='+ add';
  add.onclick=()=>{ arr.push(itemType?blankFromSchema(itemType):{}); rerender(); };
  fs.appendChild(add);
  return fs;
  function rerender(){ renderForm(); renderPreview(); }
}
function blankFromSchema(type){ const o={}; (SCHEMAS[type]||[]).forEach(f=>{ if(f.opt) return; o[f.k]= f.t==='array'?[]:clone(dflt(f)); }); return o; }
function mkBtn(t,fn){ const b=document.createElement('button'); b.type='button'; b.textContent=t; b.onclick=fn; return b; }

/* ---------- icon search ---------- */
let iconCb=null;
function openIconSearch(cb){ iconCb=cb; $('#iconModal').classList.add('open'); $('#iconSearch').value=''; $('#iconSearch').focus(); fillIcons(''); }
function fillIcons(q){
  q=(q||'').toLowerCase().trim();
  const list = q ? ICON_LIST.filter(i=>i.name.includes(q)) : ICON_LIST.slice(0,200);
  $('#iconCount').textContent = (q? list.length : ICON_LIST.length)+' icons'+(q?'':' (showing first 200 — type to search)');
  $('#iconGrid').innerHTML = list.slice(0,400).map(i=>
    `<button type="button" data-n="${i.name}" title="${i.name}">${i.svg}<span class="nm">${i.name}</span></button>`).join('');
  $('#iconGrid').querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(iconCb) iconCb(b.dataset.n); $('#iconModal').classList.remove('open'); });
}
$('#iconSearch').oninput = e=>fillIcons(e.target.value);
$('#iconClose').onclick = ()=>$('#iconModal').classList.remove('open');
$('#iconModal').onclick = e=>{ if(e.target.id==='iconModal') $('#iconModal').classList.remove('open'); };

/* ---------- preview ---------- */
function renderPreview(){
  const p=$('#preview'); const S=DATA.sections||{}; const soc=DATA.socials||[];
  const cards = soc.filter(s=>s.card!==false).map(s=>`
    <div class="pv_card${s.featured?' featured':''}">
      <span class="ic">${ICONS[s.icon]||'?'}</span>
      <h4>${esc(s.name)}${s.badge?`<span class="pv_badge">${esc(s.badge)}</span>`:''}</h4>
      <span class="u">${esc(s.handle||'')}</span>
    </div>`).join('');
  const secs = ['merch','fanart','about','stream','support'].filter(k=>S[k]).map(k=>`
    <div class="pv_sec"><b>${esc(S[k].title||k)}</b><p>${esc(S[k].body||'')}</p></div>`).join('');
  const cdc = (S.cdc||[]).map(c=>`<div class="pv_sec"><b>${esc(c.title)}</b><p>${esc(c.body)}</p></div>`).join('');
  p.innerHTML =
    `<div class="pv_h">${esc((DATA.site&&DATA.site.name)||'')} — ${esc((DATA.site&&DATA.site.tagline)||'')}</div>`+
    `<div class="pv_h">socials cards (${soc.filter(s=>s.card!==false).length})</div><div class="pv_cards">${cards}</div>`+
    `<div class="pv_h">sections</div>${secs}`+
    `<div class="pv_h">chaos / disaster / cataclysm</div>${cdc}`+
    (S.quote?`<div class="pv_h">quote</div><div class="pv_sec"><p>"${esc(S.quote.text||'')}"</p><b>— ${esc(S.quote.author||'')}</b></div>`:'');
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- wire up ---------- */
$('#openBtn').onclick = async ()=>{
  if(!hasFS){ setStatus('this browser has no File System Access API — use Chrome/Edge, or download', 'err'); return; }
  try{
    const root = await window.showDirectoryPicker();
    dataHandle = await (await root.getDirectoryHandle('assets')).getDirectoryHandle('data');
    $('#saveBtn').disabled = false;
    await loadAll();
  }catch(err){ if(err.name!=='AbortError') setStatus('open failed: '+err.message,'err'); }
};
$('#saveBtn').onclick = saveAll;
$('#dlBtn').onclick = downloadCurrent;
$('#dlAllBtn').onclick = downloadAll;
if(!hasFS){
  /* Firefox / Safari: no File System Access API — download is the save path */
  $('#openBtn').textContent = 'live save N/A (use download)';
  $('#openBtn').classList.remove('primary');
  $('#dlAllBtn').classList.add('primary');
  setStatus('your browser can\'t save to disk directly — edit here, then "download all (4)" and drop the files into assets/data/', '');
}

/* initial read-only load over http so you see content immediately */
loadAll();
</script>
</body>
</html>
