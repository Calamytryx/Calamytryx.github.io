<!DOCTYPE html>
<html lang="en" data-snap>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calamytryx — Projects</title>
  <link rel="icon" href="/assets/media/logo.png">
  <link rel="stylesheet" href="/my_css.css">
  <script src="/assets/layout/include.js" defer></script>
  <script src="/assets/layout/render.js" defer></script>
  <script src="/assets/layout/panels.js" defer></script>
  <script src="/assets/layout/cursors.js" defer></script>
</head>
<body data-page="projects">

  <div data-include="/assets/layout/header.html"></div>

  <main data-sections>
    <div data-include="/assets/layout/body/projects_intro.html"></div>
  </main>

  <div data-include="/assets/layout/footer.html"></div>

  <!-- page-personalized script: pull public repos from GitHub -->
  <script>
    (function () {
      'use strict';
      var GH_USER = 'Calamytryx';
      var FUNNY = [
        '// no readme. it works on my machine ¯\\_(ツ)_/¯',
        '// docs? the code IS the documentation.',
        '// README.md not found. godspeed, soldier.',
        '// undocumented chaos — dive in and find out.',
        '// no readme. vibes-based engineering.',
        '// here be dragons 🐉 (and zero docs)',
        '// TODO: write a readme. (added ages ago)'
      ];
      function esc(s) {
        return (s == null ? '' : String(s)).replace(/[&<>"]/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
      }
      function funny(name) { var h = 0; for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0; return FUNNY[h % FUNNY.length]; }
      function ago(iso) {
        var s = (Date.now() - new Date(iso).getTime()) / 1000, d = s / 86400;
        if (d < 1) return 'today'; if (d < 2) return 'yesterday';
        if (d < 30) return Math.floor(d) + 'd ago'; if (d < 365) return Math.floor(d / 30) + 'mo ago';
        return Math.floor(d / 365) + 'y ago';
      }
      function cleanMd(s) {
        return s.replace(/```[\s\S]*?```/g, ' ').replace(/<[^>]+>/g, ' ')
          .replace(/!\[[^\]]*\]\([^)]*\)/g, '').replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
          .replace(/^\s*[#>*\-+|=]+/gm, ' ').replace(/[`*_~]+/g, '').replace(/\s+/g, ' ').trim();
      }
      var $ = function (id) { return document.getElementById(id); };

      /* ---------------- featured gallery ---------------- */
      var LAB = { mk_chat:'chat', mk_scene:'scene', mk_alert:'alert', mk_timer:'timer', mk_bar:'banner',
        mk_sting:'stinger', mk_boot:'boot log', mk_video:'video', mk_sched:'weekly', mk_fmt:'formats', mk_emote:'export', mk_key:'bg key' };
      var PREVIEW_MS = 1500;
      function initGallery() {
        var gs = [].slice.call(document.querySelectorAll('.gallery'));
        if (gs.length) gs.forEach(initOneGallery);
        else initOneGallery(null);   /* fallback: legacy single #gallery */
      }
      function initOneGallery(g) {
        g = g || $('gallery'); if (!g) return;
        var wrap = g.closest ? g.closest('.gallery_wrap') : null;
        var cards = [].slice.call(g.querySelectorAll('.gcard'));
        cards.forEach(function (card) {
          card._sl = [].slice.call(card.querySelectorAll('.slide'));
          var db = card.querySelector('.gc_dots');
          card._dt = card._sl.map(function () { var d = document.createElement('i'); if (db) db.appendChild(d); return d; });
          card._cp = card.querySelector('.gc_tag .cap');
        });
        if (!cards.length) return;
        var n = cards.length, cur = 0, pidx = 0, paused = false, t = null;
        function stride() { return (cards.length > 1) ? (cards[1].offsetLeft - cards[0].offsetLeft) : g.clientWidth; }
        function lab(s) { var mk = s && s.querySelector('[class*=mk_]'); var k = mk ? (mk.className.match(/mk_\w+/) || [''])[0] : ''; return LAB[k]; }
        function render() {
          cards.forEach(function (card, ci) {
            var pi = (ci === cur) ? pidx : 0;
            card._sl.forEach(function (s, j) { s.classList.toggle('on', j === pi); });
            card._dt.forEach(function (d, j) { d.classList.toggle('on', j === pi); });
            if (card._cp) card._cp.textContent = lab(card._sl[pi]) || ('0' + (pi + 1)).slice(-2);
          });
        }
        function schedule() { clearTimeout(t); t = setTimeout(step, PREVIEW_MS); }
        function step() {
          pidx++;
          if (pidx >= cards[cur]._sl.length) {           /* current card has shown ALL its previews */
            pidx = 0;
            if (!paused) { cur = (cur + 1) % n; g.scrollTo({ left: cur * stride(), behavior: 'smooth' }); } /* …now move on (unless hovering) */
          }
          render(); schedule();
        }
        function jump(i) { cur = (i + n) % n; pidx = 0; g.scrollTo({ left: cur * stride(), behavior: 'smooth' }); render(); schedule(); }
        var scope = wrap || document;
        var p = scope.querySelector('.gnav.prev'), nx = scope.querySelector('.gnav.next');
        if (n < 2) { if (p) p.style.display = 'none'; if (nx) nx.style.display = 'none'; }
        if (p) p.onclick = function () { jump(cur - 1); };
        if (nx) nx.onclick = function () { jump(cur + 1); };
        g.addEventListener('mouseenter', function () { paused = true; });   /* hover freezes the carousel; previews keep cycling */
        g.addEventListener('mouseleave', function () { paused = false; });
        var sc; g.addEventListener('scroll', function () { clearTimeout(sc); sc = setTimeout(function () { var i = Math.round(g.scrollLeft / stride()); if (i >= 0 && i < n && i !== cur) { cur = i; pidx = 0; render(); schedule(); } }, 160); });
        render(); schedule();
      }

      /* ---------------- github (cached + raw README, no API rate-limit issues) ---------------- */
      var CACHE_KEY = 'cmytryx_repos_v2', CACHE_TTL = 12 * 60 * 60 * 1000; /* 12h — survives rate-limit windows */
      function repoCard(r) {
        var lang = r.language ? '<span class="lang"><span class="dot"></span>' + esc(r.language) + '</span>' : '<span class="lang" style="opacity:.55">— no lang</span>';
        var stars = '<span>★ ' + (r.stargazers_count || 0) + '</span>';
        var upd = r.updated_at ? '<span class="up">updated ' + ago(r.updated_at) + '</span>' : '';
        return '<li><a class="repo_card" data-repo="' + esc(r.name) + '" data-branch="' + esc(r.default_branch || 'HEAD') + '" href="' + esc(r.html_url) + '" target="_blank" rel="noopener">'
          + '<div class="rc_top">'
          + '<div class="rc_face"><span class="tag">// github</span><h3>' + esc(r.name) + '</h3>'
          + '<p class="d">' + (r.description ? esc(r.description) : 'no description.') + '</p></div>'
          + '<div class="rc_readme"><div class="cap"><span>readme.md</span><b>' + esc(r.name) + '</b></div>'
          + '<div class="rd"><span class="ld">// hover-loading readme…</span></div></div>'
          + '</div><div class="rc_meta">' + lang + stars + upd + '</div></a></li>';
      }
      function loadReadme(a) {
        if (a._rl) return; a._rl = true;
        var name = a.getAttribute('data-repo'), br = a.getAttribute('data-branch') || 'HEAD', box = a.querySelector('.rd');
        var base = 'https://raw.githubusercontent.com/' + GH_USER + '/' + name + '/';
        var urls = [base + br + '/README.md', base + br + '/readme.md', base + 'HEAD/README.md'];
        (function tryU(i) {
          if (i >= urls.length) { box.textContent = funny(name); return; }
          fetch(urls[i]).then(function (res) { if (!res.ok) throw 0; return res.text(); })
            .then(function (t) { t = cleanMd(t); box.textContent = t ? (t.slice(0, 420) + (t.length > 420 ? '…' : '')) : funny(name); })
            .catch(function () { tryU(i + 1); });
        })(0);
      }
      function renderRepos(list, status) {
        var grid = $('repo_grid'); if (!grid) return;
        grid.innerHTML = '';
        list.forEach(function (r) { grid.insertAdjacentHTML('beforeend', repoCard(r)); });
      }
      function gh() {
        var grid = $('repo_grid'), status = $('repo_status'); if (!grid) return;
        grid.addEventListener('mouseover', function (e) { var a = e.target.closest('.repo_card'); if (a) loadReadme(a); });
        grid.addEventListener('focusin', function (e) { var a = e.target.closest('.repo_card'); if (a) loadReadme(a); });

        var cached = null; try { cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); } catch (e) {}
        if (cached && cached.list && cached.list.length && (Date.now() - cached.t) < CACHE_TTL) {
          renderRepos(cached.list); if (status) status.remove(); return;
        }

        var shown = false;
        /* refresh from the live API (best effort): updates stars/dates, or fills in if nothing showed yet */
        function apiRefresh() {
          fetch('https://api.github.com/users/' + GH_USER + '/repos?sort=updated&per_page=100')
            .then(function (res) { if (res.status === 403) { var e = new Error('rate limit'); e.rl = true; throw e; } if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
            .then(function (repos) {
              var list = repos.filter(function (r) { return !r.fork; }).map(function (r) {
                return { name: r.name, html_url: r.html_url, description: r.description, language: r.language, stargazers_count: r.stargazers_count, updated_at: r.updated_at, default_branch: r.default_branch };
              });
              if (!list.length) { if (!shown && status) status.textContent = '// no public repositories found'; return; }
              try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), list: list })); } catch (e) {}
              renderRepos(list); if (status) status.remove(); shown = true;
            })
            .catch(function (err) {
              if (shown) return;                                  /* static/cache already on screen — ignore API failure */
              if (cached && cached.list && cached.list.length) { renderRepos(cached.list); if (status) status.innerHTML = '// showing cached repos — github API is rate-limited (403) right now.'; return; }
              rl403(status, err);
            });
        }

        /* static bundled list FIRST — instant, no API call, no 403 (kept fresh by the daily GitHub Action) */
        fetch('/assets/data/repos.json', { cache: 'no-cache' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (s) { s = (s || []).filter(function (r) { return !r.fork; }); if (s.length) { renderRepos(s); if (status) status.remove(); shown = true; } })
          .catch(function () {})
          .then(apiRefresh);
      }
      function rl403(status, err) {
        if (!status) return;
        if (err && err.rl) {
          status.innerHTML = '// github API hit its hourly rate limit (403) — it resets within the hour. <span class="retry">retry</span> · meanwhile see <a href="https://github.com/' + GH_USER + '" target="_blank" rel="noopener" style="color:var(--blood)">github.com/' + GH_USER + '</a>';
          var rb = status.querySelector('.retry'); if (rb) rb.onclick = function () { status.textContent = '// retrying…'; gh(); };
        } else { status.textContent = '// couldn\'t reach github (' + (err && err.message || 'error') + ')'; }
      }
      function initReveal() {
        try { if (matchMedia('(prefers-reduced-motion:reduce)').matches) return; } catch (e) {}
        if (!('IntersectionObserver' in window)) return;
        var els = [].slice.call(document.querySelectorAll('#featured .pi_group'));
        if (!els.length) return;
        els.forEach(function (el) { el.classList.add('reveal'); });
        var io = new IntersectionObserver(function (es) {
          es.forEach(function (en) { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
        }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
        els.forEach(function (el) { io.observe(el); });
      }
      function initProjects() { initGallery(); initReveal(); gh(); }
      if (window.__includesDone) initProjects();
      else document.addEventListener('includes:done', initProjects);
    })();
  </script>

</body>
</html>
